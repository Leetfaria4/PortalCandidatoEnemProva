<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Candidato - ENEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Portal do Candidato - ENEM</header>

    <div class="container">
    <div class="card">
    <h2>Login</h2>
    <form id="formLogin">
    <label for="loginEmail">E-mail</label><br>
    <input type="text" id="loginEmail" placeholder="seuemail@gmail.com"><br><br>

    <label for="loginSenha">Senha</label><br>
    <input type="password" id="loginSenha" placeholder="Digite sua senha"><br><br>

    <p id="resultado-login"></p>

    <button type="submit" class="botao botao-amarelo">Entrar</button>
    <button type="button" class="botao botao-verde" id="btnCadastrar">Cadastrar Novo Usuário</button>
</form>
        </div>
    </div>

    <footer>©️ 2026 - Portal ENEM. Todos os direitos reservados.</footer>
    <script src="login.js"></script>
</body>
</html>
